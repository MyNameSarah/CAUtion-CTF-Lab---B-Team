<!DOCTYPE html>
<html>
<head>
    <title>Challenge 3</title>
</head>
<body>

<h1>Challenge 3 - Profile Update IDOR</h1>

<p>
Update your profile information.
</p>

<hr>

<form action="/profile/update" method="POST">

    <input type="hidden"
           name="user_id"
           value="{{ user.id }}">

    <label>Email:</label>
    <br>

    <input type="text"
           name="email"
           value="{{ user.email }}">

    <br><br>

    <button type="submit">
        Update Profile
    </button>

</form>

<br>

<a href="/home">Back Home</a>

</body>
</html>
