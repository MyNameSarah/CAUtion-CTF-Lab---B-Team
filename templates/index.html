{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="bg-white p-5 rounded shadow-sm">
                <h2 class="mb-4 text-center">🪪 프로필 카드 생성</h2>
                <form action="/profile" method="post">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">이름</label>
                        <input type="text" name="name" class="form-control" placeholder="이름을 입력하세요" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">자기소개</label>
                        <textarea name="bio" class="form-control" rows="4" placeholder="템플릿 문법을 지원합니다 (예: {{ 7*7 }})"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">카드 배경색</label>
                        <input type="color" name="color" class="form-control form-control-color" value="#ffffff">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 p-2">프로필 생성 및 저장</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/" class="text-secondary">목록으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
