<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { background-color: #0d0d0d; color: #33ff33; font-family: 'Courier New', monospace; padding: 50px; }
        .container { border: 1px solid #33ff33; padding: 20px; max-width: 800px; margin: 0 auto; box-shadow: 0 0 10px #33ff33; }
        input[type="text"] { background: #000; color: #33ff33; border: 1px solid #33ff33; padding: 5px; width: 70%; font-weight: bold; }
        button { background: #33ff33; color: #000; border: none; padding: 6px 15px; font-weight: bold; cursor: pointer; }
        .result-box { margin-top: 20px; border-top: 1px dashed #33ff33; padding-top: 20px; }
        .secret-input { background: transparent; color: #33ff33; border: none; font-family: inherit; font-size: 16px; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>[!] Admin Login</h2>
        <form method="POST" action="/">
            > <input type="text" name="username" placeholder="Username" autocomplete="off" autofocus>
            <button type="submit">Login</button>
        </form>

        {% if error_msg %}
        <p style="color: red;">[-] {{ error_msg }}</p>
        {% endif %}

        {% if results %}
            <div class="result-box">
                <p>[*] Authentication Results:</p>
                <table style="width: 100%; text-align: left;">
                    <tr><th>User</th><th>Password</th></tr>
                    {% for row in results %}
                    <tr>
                        <td style="width: 30%;">{{ row['username'] }}</td>
                        <td><input type="password" value="{{ row['dummy_pw'] }}" class="secret-input" readonly></td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
        {% endif %}
    </div>
</body>
</html>
