name: file-upload

services:
  web:
    build: ./web
    ports:
      - "127.0.0.1:${APP_PORT:-10003}:80"
    networks:
      - app_net
    environment:
      - STORAGE_URL=http://storage:80
    depends_on:
      - storage
    restart: unless-stopped

  storage:
    build: ./storage
    volumes:
      - ./.secrets/storage:/flag.txt:ro
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
